name: Generar resultados del grafo

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  ejecutar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install networkx numpy sympy matplotlib
      - run: python Grafos.py
      - name: Subir resultados a la rama main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add resultados_grafo.txt
          git commit -m "Actualizar resultados del grafo" || echo "No hay cambios"
          git push
